<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Catálogo · Ferrer Lanfranchi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #00cebd;
  --blue:    #2563eb;
  --sky:     #dbeafe;
  --g50:     #f8fafc;
  --g100:    #f1f5f9;
  --g200:    #e2e8f0;
  --g400:    #94a3b8;
  --g600:    #475569;
  --g800:    #1e293b;
  --green:   #10b981;
  --red:     #ef4444;
  --r:       10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--g100);
  color: var(--g800);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.app-header {
  background: var(--navy);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.app-header h1 { font-size: 17px; font-weight: 700; }
.app-header p  { font-size: 12px; opacity: .65; margin-top: 2px; }

/* ── Layout ── */
.app-body {
  display: grid;
  grid-template-columns: 340px 1fr;
  flex: 1;
  overflow: hidden;
}
@media (max-width: 700px) {
  body { overflow: auto; }
  .app-body { grid-template-columns: 1fr; overflow: visible; }
}

/* ── Sidebar ── */
.sidebar {
  background: white;
  border-right: 1px solid var(--g200);
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow-y: auto;
}

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--g600);
  margin-bottom: 6px;
}
.field input,
.field textarea {
  width: 100%;
  border: 1.5px solid var(--g200);
  border-radius: 7px;
  padding: 9px 11px;
  font-size: 13.5px;
  font-family: inherit;
  color: var(--g800);
  outline: none;
  transition: border-color .15s;
}
.field input:focus,
.field textarea:focus { border-color: var(--blue); }
.field textarea {
  min-height: 150px;
  resize: vertical;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  line-height: 1.7;
}
.field small { display: block; margin-top: 5px; font-size: 12px; color: var(--g400); }

.btn-primary {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 7px;
  padding: 11px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:hover { opacity: .87; }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }

.btn-secondary {
  width: 100%;
  background: white;
  color: var(--navy);
  border: 1.5px solid var(--navy);
  border-radius: 7px;
  padding: 9px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.btn-secondary:hover { background: var(--sky); }

.btn-publish {
  width: 100%;
  background: #059669;
  color: white;
  border: none;
  border-radius: 7px;
  padding: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-publish:hover    { opacity: .87; }
.btn-publish:disabled { opacity: .45; cursor: not-allowed; }

.pub-result {
  font-size: 12px;
  background: #ecfdf5;
  border: 1px solid #6ee7b7;
  border-radius: 6px;
  padding: 9px 12px;
  word-break: break-all;
  color: #065f46;
  line-height: 1.5;
}
.pub-result.error {
  background: #fef2f2;
  border-color: #fca5a5;
  color: #991b1b;
}

#status { font-size: 13px; color: var(--g600); min-height: 18px; line-height: 1.4; white-space: pre-line; }
#status.error   { color: var(--red); }
#status.success { color: var(--green); }

.hidden { display: none !important; }

/* ── Preview panel ── */
.preview-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.preview-bar {
  background: white;
  border-bottom: 1px solid var(--g200);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}
.preview-bar span { font-size: 12.5px; color: var(--g400); }

.badge {
  font-size: 12px;
  background: var(--g100);
  border: 1px solid var(--g200);
  border-radius: 20px;
  padding: 3px 10px;
  color: var(--g600);
}

.preview-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--g400);
  font-size: 14px;
}
.preview-empty svg { opacity: .25; }

#preview-frame {
  flex: 1;
  border: none;
  width: 100%;
}

/* Spinner */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: rot .55s linear infinite;
  flex-shrink: 0;
}
@keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>Generador de Catálogo</h1>
    <p>Ferrer Lanfranchi · Inmuebles y Desarrollos</p>
  </div>
</header>

<div class="app-body">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="field">
      <label>Título del catálogo</label>
      <input type="text" id="catalog-title"
        placeholder="Ej: Propiedades · Mayo 2026">
    </div>

    <div class="field">
      <label>Links de propiedades</label>
      <textarea id="links"
        placeholder="https://ficha.info/p/abc123&#10;http://www.ferrerlanfranchi.com.ar/p/8065850-prop&#10;https://ficha.info/p/def456"></textarea>
      <small>Un link por línea. Aceptá links de ficha.info o del sitio web.</small>
    </div>

    <button class="btn-primary" id="gen-btn" onclick="generate()">
      Generar catálogo
    </button>

    <div id="status"></div>

    <div id="pub-status" class="hidden pub-result"></div>

  </aside>

  <!-- ── Preview ── -->
  <div class="preview-panel">
    <div class="preview-bar">
      <span>Vista previa</span>
      <span class="badge hidden" id="counter"></span>
    </div>

    <div class="preview-empty" id="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
      </svg>
      <p>El catálogo aparecerá aquí</p>
    </div>

    <iframe id="preview-frame" class="hidden"></iframe>
  </div>

</div>

<!-- ════════════════════════════════════════════════════════════
     JavaScript
════════════════════════════════════════════════════════════ -->
<script>
let generatedHTML = '';
let lastProps = [];

// ─── Main generator ──────────────────────────────────────────

async function generate() {
  const raw   = document.getElementById('links').value;
  const title = document.getElementById('catalog-title').value.trim()
                  || 'Catálogo de Propiedades';

  // Separar URLs pegadas: insertar \n antes de http:// o www. que aparezcan pegados
  const normalized = raw
    .replace(/(?<=[a-zA-Z0-9])(https?:\/\/)/g, '\n$1')   // ...prophttp:// → salto
    .replace(/(?<=[a-zA-Z0-9])(www\.)/g,        '\n$1'); // ...propwww.    → salto
  const links = normalized
    .split('\n')
    .map(l => {
      l = l.trim();
      // Agregar http:// si arranca con www.
      if (/^www\./i.test(l)) l = 'http://' + l;
      return l;
    })
    .filter(l =>
      /^https?:\/\/ficha\.info\/p\/[a-f0-9]+/.test(l) ||
      /^https?:\/\/(www\.)?ferrerlanfranchi\.com\.ar\/p\/\d+/.test(l)
    );

  if (!links.length) {
    setStatus('Pegá al menos un link válido (ficha.info o sitio web de la propiedad).', 'error');
    return;
  }

  // Reset UI
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Generando…';
  document.getElementById('pub-status').classList.add('hidden');
  document.getElementById('preview-frame').classList.add('hidden');
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('counter').classList.add('hidden');
  setStatus('');

  const props = [];
  const errorMsgs = [];

  for (let i = 0; i < links.length; i++) {
    setStatus(`Obteniendo propiedad ${i + 1} de ${links.length}…`);
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 30000); // 30s timeout por propiedad
      try {
        const res  = await fetch(`/api/property?url=${encodeURIComponent(links[i])}`, { signal: ctrl.signal });
        const data = await res.json();
        if (data && !data.error) {
          props.push(data);
        } else {
          errorMsgs.push(`Link ${i + 1}: ${data?.error || 'error desconocido'}`);
        }
      } finally {
        clearTimeout(timer);
      }
    } catch (e) {
      errorMsgs.push(`Link ${i + 1}: ${e.name === 'AbortError' ? 'tiempo de espera agotado (30s)' : e.message}`);
    }
  }

  btn.disabled = false;
  btn.textContent = 'Generar catálogo';

  if (!props.length) {
    setStatus('No se pudo obtener ninguna propiedad:\n' + errorMsgs.join('\n'), 'error');
    return;
  }

  // Build & show
  lastProps = props;
  generatedHTML = buildCatalog(title, props);

  const frame = document.getElementById('preview-frame');
  frame.srcdoc = generatedHTML;
  frame.classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');

  const errCount = errorMsgs.length;
  const counter  = document.getElementById('counter');
  counter.classList.remove('hidden');
  counter.textContent = `${props.length} propiedad${props.length !== 1 ? 'es' : ''}${errCount ? ` · ${errCount} error${errCount > 1 ? 'es' : ''}` : ''}`;

  const partialMsg = errCount
    ? `${props.length} propiedades OK, ${errCount} link${errCount > 1 ? 's' : ''} con error. Publicando…`
    : `${props.length} propiedad${props.length !== 1 ? 'es' : ''} generada${props.length !== 1 ? 's' : ''}. Publicando…`;
  setStatus(partialMsg, 'success');

  // Auto-publish
  const pubDiv = document.getElementById('pub-status');
  pubDiv.className = 'pub-result';
  pubDiv.innerHTML = '<span class="spin"></span> Publicando…';
  try {
    const res  = await fetch('/api/publish', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ html: generatedHTML, title }),
    });
    const data = await res.json();
    if (data.url) {
      pubDiv.className = 'pub-result';
      pubDiv.innerHTML = `✅ Catálogo publicado: <a href="${data.url}" target="_blank">${data.url}</a><br>
        <button onclick="copyUrl('${data.url}', this)" style="margin-top:7px;padding:4px 10px;font-size:12px;cursor:pointer;border:1px solid #059669;background:white;border-radius:5px;color:#059669;font-weight:700;">📋 Copiar link</button>`;
      const finalMsg = errCount
        ? `Listo. ${props.length} propiedades OK, ${errCount} error${errCount > 1 ? 'es' : ''}.`
        : `Listo. ${props.length} propiedad${props.length !== 1 ? 'es' : ''}.`;
      setStatus(finalMsg, 'success');
    } else {
      pubDiv.className = 'pub-result error';
      pubDiv.textContent = `No se pudo publicar: ${data.error || 'error desconocido'}`;
      setStatus('Catálogo generado, pero no se pudo publicar.', 'error');
    }
  } catch (e) {
    pubDiv.className = 'pub-result error';
    pubDiv.textContent = `Error de red al publicar: ${e.message}`;
    setStatus('Catálogo generado, pero no se pudo publicar.', 'error');
  }
}

function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✔ Copiado!';
    setTimeout(() => { btn.textContent = '📋 Copiar link'; }, 2000);
  });
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = type;
}

function slug(str) {
  return str.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').slice(0, 40) || 'propiedades';
}

// ─── Catalog builder ─────────────────────────────────────────

function buildCatalog(title, props) {
  const company  = props.find(p => p.company?.logo)?.company || {};
  const today    = new Date().toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' });
  const cards    = props.map(card).join('\n');
  // Logo en fondo navy 1200x630 → WhatsApp muestra preview pequeña y prolija
  const ogImage = company.logo
    ? `https://wsrv.nl/?url=${encodeURIComponent(company.logo)}&w=1200&h=630&fit=contain&cbg=ffffff&output=jpg`
    : (props[0]?.coverImageOg || props[0]?.coverImage || '');
  const ogDesc  = `${props.length} propiedad${props.length !== 1 ? 'es' : ''} · ${company.name || 'Catálogo inmobiliario'}`;

  return `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${h(title)}</title>
<meta name="description" content="${h(ogDesc)}">
<meta property="og:type" content="website">
<meta property="og:title" content="${h(title)}">
<meta property="og:description" content="${h(ogDesc)}">
<meta property="og:image" content="${h(ogImage)}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${h(title)}">
<meta name="twitter:description" content="${h(ogDesc)}">
<meta name="twitter:image" content="${h(ogImage)}">
<style>${catalogCSS()}</style>
</head>
<body>

<header class="hd">
  <div class="hd-inner">
    <div class="hd-left">
      <a href="http://ferrerlanfranchi.com.ar" target="_blank" rel="noopener" style="display:inline-block;">
        ${company.logo
          ? `<img src="${h(company.logo)}" alt="${h(company.name)}" class="hd-logo">`
          : `<span class="hd-name">${h(company.name || 'Catálogo')}</span>`}
      </a>
    </div>
    <div class="hd-center">
      <h1 class="hd-title">${h(title)}</h1>
      <p class="hd-sub">${props.length} propiedad${props.length !== 1 ? 'es' : ''} · ${today}</p>
    </div>
  </div>
</header>

<main class="main">
  <div class="grid">
${cards}
  </div>
</main>

<footer class="ft">
  <div class="ft-inner">
    <a href="http://ferrerlanfranchi.com.ar" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">${h(company.name || '')}</a>
    <a href="https://share.google/4zqDw8YZpSsFed6KA" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">Referencias de la firma</a>
  </div>
</footer>

<script>
// Arranca el slideshow de una card recién cuando el usuario la ve
function startSlideshow(wrap) {
  const slides = wrap.querySelectorAll('.slide');
  if (slides.length < 2) return;
  const dots = wrap.querySelectorAll('.dot');
  let cur = 0;
  // 2 segundos de pausa para que el usuario vea la portada primero
  setTimeout(() => {
    setInterval(() => {
      slides[cur].classList.remove('on');
      dots[cur]?.classList.remove('on');
      cur = (cur + 1) % slides.length;
      slides[cur].classList.add('on');
      dots[cur]?.classList.add('on');
    }, 3500);
  }, 2000);
}

// Fade-in al hacer scroll + disparo del slideshow al aparecer
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
      const wrap = e.target.querySelector('.img-wrap');
      if (wrap) startSlideshow(wrap);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('.card').forEach(c => {
  observer.observe(c);
  c.addEventListener('touchstart', () => c.classList.add('tap'), { passive: true });
  c.addEventListener('touchend',   () => setTimeout(() => c.classList.remove('tap'), 320));
  c.addEventListener('touchcancel',() => c.classList.remove('tap'));
});
<\/script>
</body>
</html>`;
}

function card(p) {
  const a     = p.attributes || {};
  const loc   = (p.location || '').split('|').map(s => s.trim()).filter(Boolean);
  const chips = [a.totalSurface, a.rooms, a.bedrooms, a.bathrooms, a.parking]
    .filter(Boolean)
    .map(c => `<span class="chip">${h(c)}</span>`)
    .join('');

  const statusClass = (p.status || '').toLowerCase().replace(/\s+/g, '-');
  const statusBadge = (p.status && p.status !== 'Disponible')
    ? `<span class="s-badge s-${statusClass}">${h(p.status)}</span>` : '';

  const neighborhood = loc[0] || '';
  const rest         = loc.slice(1).join(', ');

  return `    <article class="card">
      <a href="${h(p.url)}" target="_blank" rel="noopener" class="card-link">
        <div class="img-wrap">
          ${(() => {
              const imgs = (p.images && p.images.length > 0)
                ? p.images
                : (p.coverImage ? [p.coverImage] : []);
              if (!imgs.length) return '<div class="img-ph"></div>';
              return imgs.map((src, i) =>
                  `<img src="${h(src)}" alt="${h(p.address)}" class="img slide${i === 0 ? ' on' : ''}" loading="lazy">`
                ).join('')
                + (imgs.length > 1
                  ? `<div class="slide-dots">${imgs.map((_, i) =>
                      `<span class="dot${i === 0 ? ' on' : ''}"></span>`).join('')}</div>`
                  : '');
            })()}
          <div class="img-overlay"></div>
          ${p.type ? `<span class="t-badge">${h(p.type)}</span>` : ''}
          ${statusBadge}
          ${p.price ? `<div class="img-price">
            ${p.priceLabel ? `<span class="img-price-lbl">${h(p.priceLabel)}</span>` : ''}
            ${h(p.price)}
          </div>` : ''}
        </div>
        <div class="body">
          <h2 class="addr">${h(p.title || p.address)}</h2>
          ${neighborhood ? `<p class="loc">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;margin-top:1px"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            ${h(neighborhood)}${rest ? `<span class="loc-rest">, ${h(rest)}</span>` : ''}
          </p>` : ''}
          ${chips ? `<div class="attrs">${chips}</div>` : ''}
          <span class="cta">Ver ficha completa <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
        </div>
      </a>
    </article>`;
}

function h(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Catalog CSS (inlined in the generated file) ──────────────

function catalogCSS() {
  return `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#00cebd;
  --navy2:#00b3a4;
  --gold:#c8860a;
  --gold2:#f5a623;
  --text:#1a2332;
  --muted:#5a6a7e;
  --border:#dde4ed;
  --bg:#f2f5f9;
  --card:#fff;
  --r:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.hd{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;padding:28px 32px 32px;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hd-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:24px;position:relative}
.hd-logo{height:90px;width:auto;max-width:240px;object-fit:contain;background:#fff;border-radius:12px;padding:8px 16px;box-shadow:0 4px 14px rgba(0,0,0,.22)}
.hd-name{font-size:18px;font-weight:800;letter-spacing:-.01em}
.hd-center{flex:1;min-width:0}
.hd-title{font-size:24px;font-weight:800;line-height:1.2;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-sub{font-size:13px;opacity:.6;margin-top:5px;font-weight:500;white-space:nowrap}
@media(max-width:600px){
  .hd{padding:22px 20px 26px}
  .hd-inner{flex-direction:column;align-items:center;text-align:center;gap:14px}
  .hd-logo{height:96px;max-width:200px}
  .hd-title{font-size:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .hd-sub{white-space:nowrap}
}

/* ── Grid ── */
.main{max-width:1200px;margin:0 auto;padding:36px 24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.main{padding:20px 14px}}

/* ── Card ── */
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.07);transition:box-shadow .25s,transform .25s;opacity:0;transform:translateY(16px)}
.card.visible{opacity:1;transform:translateY(0);transition:opacity .45s ease,transform .45s ease,box-shadow .25s,transform-origin .25s}
.card:hover,.card.tap{box-shadow:0 12px 36px rgba(0,206,189,.25),0 0 0 2px #00cebd;transform:translateY(-4px)}
.card-link{display:flex;flex-direction:column;text-decoration:none;color:inherit;height:100%}

/* ── Image ── */
.img-wrap{position:relative;padding-top:65%;background:var(--border);overflow:hidden;flex-shrink:0}
.img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.card:hover .img,.card.tap .img{transform:scale(1.04)}
/* Slideshow */
.slide{opacity:0;transition:opacity .9s ease,transform .4s ease}
.slide.on{opacity:1}
.card:hover .slide.on,.card.tap .slide.on{transform:scale(1.04)}
.slide-dots{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:4;pointer-events:none}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .35s,transform .35s}
.dot.on{background:rgba(255,255,255,.95);transform:scale(1.3)}
.img-ph{position:absolute;inset:0;background:linear-gradient(135deg,#dce4ef 0%,#c8d4e3 100%)}
.img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,20,40,.78) 0%,rgba(10,20,40,.1) 45%,transparent 70%);pointer-events:none}

/* ── Badges ── */
.t-badge{position:absolute;top:12px;left:12px;background:#00cebd;color:#fff;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 9px;border-radius:20px;border:none}
.s-badge{position:absolute;top:12px;right:12px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:4px 9px;border-radius:20px}
.s-reservado{background:rgba(245,158,11,.9);color:#fff}
.s-vendido,.s-alquilado{background:rgba(220,38,38,.9);color:#fff}

/* ── Price on image ── */
.img-price{position:absolute;bottom:14px;left:14px;right:14px;color:#fff;z-index:1;line-height:1.2}
.img-price-lbl{display:block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.75;margin-bottom:2px}
.img-price{font-size:20px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.4);letter-spacing:-.01em}

/* ── Card body ── */
.body{padding:16px 18px 20px;display:flex;flex-direction:column;gap:0;flex:1}
.addr{font-size:15.5px;font-weight:700;line-height:1.3;color:var(--text);letter-spacing:-.01em}
.loc{font-size:12.5px;color:var(--muted);margin-top:5px;display:flex;align-items:flex-start;gap:4px}
.loc-rest{opacity:.7}

/* ── Attributes ── */
.attrs{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.chip{font-size:11.5px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;font-weight:500}

/* ── CTA ── */
.cta{display:inline-flex;align-items:center;gap:5px;margin-top:auto;padding-top:16px;font-size:13px;font-weight:700;color:var(--navy);transition:gap .2s}
.card:hover .cta,.card.tap .cta{gap:8px}

/* ── Footer ── */
.ft{border-top:1px solid var(--border);margin-top:8px;padding:20px 24px}
.ft-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
@media(max-width:560px){.ft-inner{flex-direction:column;gap:4px;text-align:center}}
  `;
}
</script>

</body>
</html>
